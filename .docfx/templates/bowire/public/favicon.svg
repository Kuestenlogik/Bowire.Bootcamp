<?xml version="1.0" encoding="UTF-8"?>
<!--
  Bowire favicon — theme-aware tile that flips its fill based on the
  browser's prefers-color-scheme.

    Light mode: dark tile (#0f0f17, Bowire dark-bg colour) + white B.
    Dark  mode: light tile (#fafaff, Bowire light-bg colour) + dark B.

  Modern Chromium, Firefox, and Safari honour the @media query inside
  an SVG used as a favicon (Chrome 76+, Firefox 70+, Safari 12.1+).
  Older browsers fall back to the light-mode defaults below, which
  matches the bowire.io tab favicon — a black tile with the white B.

  The companion favicon.ico shipped by docfx is the alternate icon
  for browsers without SVG favicon support (alternate <link> in the
  master template); it's untouched here.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bowire-favicon-bg     { fill: #0f0f17; }
    .bowire-favicon-letter { fill: #ffffff; }
    @media (prefers-color-scheme: dark) {
      .bowire-favicon-bg     { fill: #fafaff; }
      .bowire-favicon-letter { fill: #0f0f17; }
    }
  </style>
  <rect class="bowire-favicon-bg" width="100" height="100" rx="18" ry="18"/>
  <g class="bowire-favicon-letter" transform="translate(-29.66,-103.08) scale(0.757)">
    <path d="m 98.433779,206.65457 v 16.57418 h 7.672911 c 3.27394,0 5.83185,-0.75992 7.67344,-2.27997 1.87082,-1.52004 2.80603,-3.59565 2.80603,-6.22649 0,-2.51391 -0.92052,-4.48667 -2.76211,-5.91902 -1.81236,-1.43234 -4.35557,-2.1487 -7.62951,-2.1487 z"/>
    <path d="m 98.433779,181.22304 v 14.90814 h 6.225971 c 2.92316,0 5.21814,-0.70167 6.88434,-2.10478 1.69543,-1.43235 2.54299,-3.39093 2.54299,-5.87561 0,-4.61859 -3.44955,-6.92775 -10.3482,-6.92775 z"/>
    <path d="m 105.23698,154.66911 c -26.26504,-1.7e-4 -47.557183,21.29175 -47.557298,47.55679 -1.66e-4,26.26524 21.292058,47.55747 47.557298,47.5573 26.26504,-1.2e-4 47.55695,-21.29226 47.55678,-47.5573 -1.2e-4,-26.26484 -21.29194,-47.55667 -47.55678,-47.55679 z M 84.270824,170.7875 h 22.888516 c 7.01558,0 12.4085,1.28631 16.17937,3.85868 3.77088,2.57238 5.65651,6.19671 5.65651,10.87376 0,3.39086 -1.15458,6.35812 -3.46387,8.90126 -2.28007,2.54315 -5.20324,4.31175 -8.76949,5.30562 v 0.17519 c 4.47243,0.5554 8.03849,2.20696 10.69857,4.95473 2.6893,2.74777 4.03386,6.09499 4.03386,10.04125 0,5.75862 -2.06092,10.33336 -6.18257,13.72423 -4.12165,3.36163 -9.74863,5.04258 -16.88114,5.04258 H 84.270824 Z"/>
  </g>
</svg>
