  Bowire logo — horizontal theme-aware variant.

  Derived from images/bowire_logo.svg by stripping Inkscape metadata
  and replacing the hardcoded `fill:#000000` with `fill="currentColor"`.
  The colour is driven by the CSS `color` property on the containing
  element, so the same file renders white on dark themes, dark on
  light themes, and indigo inside an accent context — no separate
  copies per colour to maintain.

  Regenerate from the upstream source by running:
      scripts/generate-icons.sh
      scripts/distribute-icons.sh
  and then manually syncing any inline copies in:
      src/Kuestenlogik.Bowire/wwwroot/js/helpers.js (bowireLogo icon entry)
      docs/templates/bowire/layout/_master.tmpl (header SVG)
      site/_includes/hero.html (marketing hero)
-->
